name: Java CI with Maven

on:
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'corretto'
        cache: maven
    - name: Read spring-base-commons version
      run: |
        echo "Reading spring-base-commons version from pom.xml \${spring-base-commons.version}..."
        SPRING_BASE_COMMONS_VERSION="$(mvn help:evaluate -Dexpression="spring-base-commons.version" -q -DforceStdout 2>/dev/null | sed -n '/^[0-9][0-9A-Za-z_.-]*$/ { p; q; }')"
        if [ -z "$SPRING_BASE_COMMONS_VERSION" ]; then
          echo "Failed to evaluate spring-base-commons.version from pom.xml"
          exit 1
        fi
        echo "SPRING_BASE_COMMONS_VERSION=$SPRING_BASE_COMMONS_VERSION" >> "$GITHUB_ENV"
    - name: Download and install spring-base-commons
      run: |
        gh release download "$SPRING_BASE_COMMONS_VERSION" \
          --repo vulinh64/spring-base-commons \
          --pattern "spring-base-commons-${SPRING_BASE_COMMONS_VERSION}.jar" \
          --dir .
        mvn install:install-file \
          -Dfile="spring-base-commons-${SPRING_BASE_COMMONS_VERSION}.jar" \
          -DgroupId=com.vulinh \
          -DartifactId=spring-base-commons \
          -Dversion="$SPRING_BASE_COMMONS_VERSION" \
          -Dpackaging=jar
      env:
        GH_TOKEN: ${{ github.token }}
    - name: Run unit tests
      run: mvn clean verify
