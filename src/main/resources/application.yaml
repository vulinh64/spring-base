#
# Application properties will be set here
#
application-properties:
  # One single point for reusability
  message-topic:
    new-comment:
      topic-name: new-comment
      type: NEW_COMMENT
    new-post:
      topic-name: new-post
      type: NEW_POST
    new-subscriber:
      topic-name: new-subscriber
      type: NEW_SUBSCRIBER
    new-post-following:
      topic-name: new-post-following
      type: NEW_POST_FOLLOWING
  security:
    # JWT issuer URI of the external auth provider (Keycloak, LogTo, self-hosted, ...).
    # Override via JWT_ISSUER_URI to plug in any OIDC-compatible identity provider.
    issuer-uri: ${JWT_ISSUER_URI:http://localhost:8080}
    # Client/audience name used to extract authorities from the JWT's resource_access claim
    # (Keycloak-style format).
    client-name: ${JWT_CLIENT_NAME:spring-base-client}
    no-authenticated-verb-urls:
      - { method: GET, url: /post/** }
      - { method: GET, url: /category/** }
      - { method: GET, url: /comment/** }
    no-authenticated-urls:
      - /free/**
      - /health
      - /health/**
      - /v3/api-docs/**
      - /swagger-ui.html
      - /swagger-ui/**
      - /swagger-resources/**
      - /configuration/ui/**
      - /configuration/security/**
      - /webjars/**
    high-privilege-verb-urls:
      - { method: DELETE, url: /category/** }
      - { method: POST, url: /category/** }
#
# End of application properties
#
server:
  port: ${SERVER_PORT:8088}
  shutdown: GRACEFUL
  servlet.context-path: /api
spring:
  application.name: spring-base
  cloud.stream:
    bindings:
      newPost-out-0:
        destination: ${application-properties.message-topic.new-post.topic-name}
      newSubscriber-out-0:
        destination: ${application-properties.message-topic.new-subscriber.topic-name}
      newComment-out-0:
        destination: ${application-properties.message-topic.new-comment.topic-name}
      newPostFollowing-out-0:
        destination: ${application-properties.message-topic.new-post-following.topic-name}
    default-binder: rabbit
  datasource:
    url: jdbc:postgresql://${POSTGRESQL_HOST:localhost}:${POSTGRESQL_PORT:5432}/${POSTGRESQL_NAME:spring-base}
    username: ${POSTGRESQL_USERNAME:postgres}
    password: ${POSTGRESQL_PASSWORD:123456}
  # Make your default spring boot logging colorful (if you are using Community version lmao)
  output.ansi.enabled: ALWAYS
  threads.virtual.enabled: true # Make use of Virtual Threads if possible
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:rabbitmq}
    password: ${RABBITMQ_PASSWORD:123456}
  security.oauth2.resourceserver.jwt:
    issuer-uri: ${application-properties.security.issuer-uri}
    audiences: account
decorator.datasource.p6spy:
  custom-appender-class: com.vulinh.utils.MyP6SpyLogging
  logging: CUSTOM
management.endpoints.web:
  base-path: ''
  exposure.include: health
springdoc.swagger-ui:
  path: /swagger-ui
  disable-swagger-default-url: true
